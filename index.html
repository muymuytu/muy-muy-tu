<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo de joyería muy-muy-tu - Pendientes, collares y anillos dorados y plateados">
    <meta name="keywords" content="joyería, pendientes, collares, anillos, dorado, plateado">
    <meta name="author" content="muy-muy-tu">
    <title>muymuytú</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Header Component -->
    <header class="header" role="banner">
        <a class="header__instagram"
           href="https://www.instagram.com/muymuytu/"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="Síguenos en Instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>
        <div class="header__brand">
            <h1 class="header__title">muymuytú.</h1>
            <span class="header__subtitle">Joyas</span>
        </div>
    </header>

    <!-- Side Menu Component -->
    <nav class="side-menu" role="navigation" aria-label="Categorías de productos">

        <div class="side-menu__item side-menu__item--has-submenu">
            <button class="filter-btn side-menu__btn"
                    data-filter="dorado"
                    aria-label="Ver categoría Dorado">
                Dorado
            </button>
            <div class="side-menu__submenu" role="menu" aria-label="Subcategorías de Dorado">
                <button class="filter-btn filter-btn--sub"
                        data-category="dorado"
                        data-subcategory="pequeños"
                        aria-label="Ver pendientes pequeños">
                    Pequeños
                </button>
                <button class="filter-btn filter-btn--sub"
                        data-category="dorado"
                        data-subcategory="grandes"
                        aria-label="Ver pendientes grandes">
                    Grandes
                </button>
                <button class="filter-btn filter-btn--sub"
                        data-category="dorado"
                        data-subcategory="tuerca"
                        aria-label="Ver pendientes tipo tuerca">
                    Tuerca
                </button>
            </div>
        </div>

        <div class="side-menu__item">
            <button class="filter-btn side-menu__btn"
                    data-filter="plateado"
                    aria-label="Ver categoría Plateado">
                Plateado
            </button>
        </div>

        <div class="side-menu__item">
            <button class="filter-btn side-menu__btn"
                    data-filter="collares"
                    aria-label="Ver categoría Collares">
                Collares
            </button>
        </div>

        <div class="side-menu__item">
            <button class="filter-btn side-menu__btn"
                    data-filter="anillos"
                    aria-label="Ver categoría Anillos">
                Anillos
            </button>
        </div>

    </nav>

    <!-- Main Content -->
    <main class="main" role="main">
        <!-- Products Grid Component -->
        <section class="products-grid" aria-label="Catálogo de productos">
            <article class="product-card hidden" data-category="dorado" data-subcategory="pequeños" role="article">
                <figure class="product-card__image product-image">
                    <img src="images/dorado/Pequenos/pequenos1.jpg" alt="Pendientes Dorados estilo 1" loading="lazy">
                </figure>
            </article>

            <article class="product-card hidden" data-category="dorado" data-subcategory="pequeños" role="article">
                <figure class="product-card__image product-image">
                    <img src="images/dorado/Pequenos/pequenos2.jpg" alt="Pendientes Dorados estilo 2" loading="lazy">
                </figure>
            </article>

            <article class="product-card hidden" data-category="dorado" data-subcategory="pequeños" role="article">
                <figure class="product-card__image product-image">
                    <img src="images/dorado/Pequenos/pequenos3.jpg" alt="Pendientes Dorados estilo 3" loading="lazy">
                </figure>
            </article>

            <article class="product-card hidden" data-category="dorado" data-subcategory="pequeños" role="article">
                <figure class="product-card__image product-image">
                    <img src="images/dorado/Pequenos/pequenos4.jpg" alt="Pendientes Dorados estilo 4" loading="lazy">
                </figure>
            </article>
        </section>
    </main>

    <!-- Footer Component -->
    <footer class="footer" role="contentinfo">
        <p>&copy; 2026 muymuytú</p>
    </footer>

    <!-- Lightbox Component -->
    <div class="lightbox lightbox--hidden" id="lightbox" role="dialog" aria-modal="true" aria-label="Imagen ampliada">
        <button class="lightbox__close" id="lightbox-close" aria-label="Cerrar imagen">✕</button>
        <img class="lightbox__image" id="lightbox-image" src="" alt="">
    </div>

    <!-- JavaScript Module -->
    <script src="js/script.js" defer></script>
</body>
</html>
